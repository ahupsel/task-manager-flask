name: CI Task Manager Flask

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar sintaxe Python
        run: |
          cd todo_project
          python -m py_compile run.py

      - name: Executar testes automatizados
        run: |
          cd todo_project
          python -m unittest discover
        continue-on-error: true

      - name: SAST com Bandit
        run: |
          pip install bandit
          bandit -r todo_project -f txt -o bandit-report.txt || true

      - name: Análise de dependências com OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'task-manager-flask'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-report'

      - name: Upload dos relatórios de segurança
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.txt
            dependency-check-report


      - name: Build da imagem Docker
        run: |
          docker build -t task-manager-flask .

  review-stage-dast:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Build da imagem Docker para ambiente de Review/Stage
        run: |
          docker build -t task-manager-flask-review .

      - name: Criar ambiente temporário de Review/Stage
        run: |
          docker run -d --name task-manager-review -p 5000:5000 task-manager-flask-review
          sleep 15
          curl -I http://localhost:5000

      - name: Executar DAST com OWASP ZAP no ambiente de Review/Stage
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000'
          cmd_options: '-a'
          allow_issue_writing: false

      - name: Remover ambiente temporário de Review/Stage
        if: always()
        run: |
          docker stop task-manager-review || true
          docker rm task-manager-review || true
