name: CI Task Manager Flask

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar sintaxe Python
        run: |
          cd todo_project
          python -m py_compile run.py

      - name: Executar testes automatizados
        run: |
          cd todo_project
          python -m unittest discover
        continue-on-error: true

      - name: SAST com Bandit
        run: |
          pip install bandit
          bandit -r todo_project -f txt -o bandit-report.txt || true

      - name: Análise de dependências com OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'task-manager-flask'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-report'

      - name: Upload dos relatórios de segurança
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.txt
            dependency-check-report


      - name: Build da imagem Docker
        run: |
          docker build -t task-manager-flask .
